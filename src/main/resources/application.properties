spring.application.name=hangeoreum-api
server.port=${SERVER_PORT:8082}
spring.datasource.url=jdbc:postgresql://localhost:5432/hangeoreum
spring.datasource.username=hangeoreum
spring.datasource.password=hangeoreum

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# compose.yaml already applies schema.sql as init script; Flyway baselines over it
spring.flyway.baseline-on-migrate=true

# postgres is managed manually (docker start hangeoreum-postgres); the Docker Desktop
# API pipe is not reachable from the JVM on this machine, so compose support is off
spring.docker.compose.enabled=false

# Jackson 3 default rejects missing/null values for primitive DTO fields — keep Jackson 2 behavior
spring.jackson.deserialization.fail-on-null-for-primitives=false

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=210MB

app.jwt.secret=${JWT_SECRET:hangeoreum-dev-secret-key-change-in-prod-32b!}
app.jwt.access-minutes=15
app.jwt.refresh-days=30
app.cors.origins=${FRONT_ORIGIN:http://localhost:4200}
app.front-url=${FRONT_URL:http://localhost:4200}
app.storage.dir=${MEDIA_DIR:./uploads}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
